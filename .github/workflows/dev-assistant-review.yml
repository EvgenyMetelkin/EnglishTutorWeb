name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check LLM config
        id: check
        env:
          PROVIDER: ${{ vars.LLM_PROVIDER || '' }}
          API_KEY: ${{ secrets.LLM_API_KEY || '' }}
        run: |
          if [ -n "$PROVIDER" ] && [ -n "$API_KEY" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Deps
        run: npm install

      - name: Build
        run: npm run build --workspace=packages/core --workspace=packages/cli

      - name: Build RAG index
        if: steps.check.outputs.configured == 'true'
        run: node packages/cli/dist/index.js index
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_EMBED_MODEL: nomic-embed-text:latest

      - name: Run AI review
        id: review
        if: steps.check.outputs.configured == 'true'
        run: |
          REVIEW=$(node packages/cli/dist/index.js review-pr \
            --base ${{ github.event.pull_request.base.ref }} \
            --format markdown)
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o' }}

      - name: Post review comment
        if: steps.check.outputs.configured == 'true' && steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            if (!review || review === 'No changes to review.') return;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: review,
            });

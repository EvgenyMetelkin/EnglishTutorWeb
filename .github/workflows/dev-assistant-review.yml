name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: ${{ vars.LLM_PROVIDER && secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dev Assistant
        run: |
          npm install -g @dev-assistant/core @dev-assistant/mcp dev-assistant
        # In production: npm install -g dev-assistant

      - name: Build RAG index
        run: npx dev-assistant index
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_EMBED_MODEL: nomic-embed-text:latest

      - name: Run AI review
        id: review
        run: |
          REVIEW=$(npx dev-assistant review-pr \
            --base ${{ github.event.pull_request.base.ref }} \
            --format markdown)
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o' }}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            if (!review || review === 'No changes to review.') return;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: review,
            });
